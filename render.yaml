databases:
  - name: dah-db
    plan: free
    databaseName: dah_db
    user: dah

services:
  - type: web
    name: dah-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements/prod.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 60"
    healthCheckPath: /admin/login/
    envVars:
      - key: ENV
        value: prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dah-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
      # À renseigner manuellement dans le dashboard Render une fois l'URL Vercel connue :
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Clé API Brevo (https://app.brevo.com/settings/keys/api — onglet "API Keys",
      # différente de la clé SMTP) : utilisée pour l'envoi via l'API HTTP de Brevo,
      # plus fiable que le SMTP brut (port 587) en sortie depuis Render.
      - key: BREVO_API_KEY
        sync: false
      # Cloudinary (https://cloudinary.com/console → Dashboard) : stockage persistant
      # des fichiers média (CV, avatars...) — le disque Render ne survit pas à un
      # redéploiement.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
