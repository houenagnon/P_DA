databases:
  - name: dah-db
    plan: free
    databaseName: dah_db
    user: dah

services:
  - type: web
    name: dah-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements/prod.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /admin/login/
    envVars:
      - key: ENV
        value: prod
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dah-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1
      # À renseigner manuellement dans le dashboard Render une fois l'URL Vercel connue :
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Identifiants SMTP Brevo (https://app.brevo.com/settings/keys/smtp) :
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
